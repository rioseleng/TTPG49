<script>
    // Micro-interaction: Subtle hover parallax on avatar
    const avatar = document.querySelector('img[data-alt]');
    if (avatar) {
      avatar.parentElement.addEventListener('mousemove', (e) => {
        const { left, top, width, height } = avatar.parentElement.getBoundingClientRect();
        const x = (e.clientX - left) / width - 0.5;
        const y = (e.clientY - top) / height - 0.5;
        avatar.style.transform = `scale(1.1) translate(${x * 10}px, ${y * 10}px)`;
      });
      avatar.parentElement.addEventListener('mouseleave', () => {
        avatar.style.transform = 'scale(1) translate(0, 0)';
      });
      avatar.style.transition = 'transform 0.1s ease-out';
    }

    // List item ripple-like click feedback
    document.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', function(e) {
        let x = e.clientX - e.target.offsetLeft;
        let y = e.clientY - e.target.offsetTop;
        let ripple = document.createElement('span');
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';
        // ripple effect logic could be added here for more flair
      });
    });
