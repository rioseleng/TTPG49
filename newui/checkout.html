<!DOCTYPE html><html class="light" lang="en" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Checkout - UTPreneurs</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@100..900&amp;family=Inter:wght@100..900&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
        body {
            background-color: #f9f9f9;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "outline": "#74777f",
                      "on-secondary": "#271900", /* High contrast for bright yellow */
                      "on-secondary-container": "#715000",
                      "on-primary": "#ffffff",
                      "surface-container-high": "#e8e8e8",
                      "primary": "#000a1e",
                      "on-secondary-fixed": "#271900",
                      "error": "#ba1a1a",
                      "surface-tint": "#465f88",
                      "on-primary-container": "#708ab5",
                      "surface-container-low": "#f3f3f4",
                      "secondary-fixed": "#ffdea6",
                      "on-tertiary-container": "#b97958",
                      "primary-container": "#002147",
                      "on-tertiary": "#ffffff",
                      "surface-bright": "#f9f9f9",
                      "surface-container-highest": "#e2e2e2",
                      "surface-container-lowest": "#ffffff",
                      "secondary": "#fdc34d", /* Swapping dark gold for bright yellow */
                      "on-primary-fixed-variant": "#2d476f",
                      "on-error": "#ffffff",
                      "on-tertiary-fixed-variant": "#6c391d",
                      "surface-container": "#eeeeee",
                      "on-error-container": "#93000a",
                      "primary-fixed-dim": "#aec7f6",
                      "background": "#f9f9f9",
                      "surface-dim": "#dadada",
                      "secondary-container": "#fdc34d",
                      "on-primary-fixed": "#001b3d",
                      "inverse-surface": "#2f3131",
                      "on-secondary-fixed-variant": "#5d4200",
                      "error-container": "#ffdad6",
                      "on-surface": "#1a1c1c",
                      "tertiary-fixed": "#ffdbcb",
                      "surface": "#f9f9f9",
                      "inverse-primary": "#aec7f6",
                      "surface-variant": "#e2e2e2",
                      "outline-variant": "#c4c6cf",
                      "inverse-on-surface": "#f0f1f1",
                      "tertiary-fixed-dim": "#ffb691",
                      "secondary-fixed-dim": "#f7bd48",
                      "on-background": "#1a1c1c",
                      "on-tertiary-fixed": "#341100",
                      "tertiary-container": "#3d1500",
                      "on-surface-variant": "#44474e",
                      "tertiary": "#180500",
                      "primary-fixed": "#d6e3ff"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "xs": "4px",
                      "sm": "12px",
                      "md": "16px",
                      "container-margin": "16px",
                      "base": "8px",
                      "xl": "32px",
                      "lg": "24px",
                      "gutter": "16px"
              },
              "fontFamily": {
                      "label-md": ["Hanken Grotesk"],
                      "headline-sm": ["Hanken Grotesk"],
                      "headline-lg": ["Hanken Grotesk"],
                      "body-md": ["Inter"],
                      "body-lg": ["Inter"],
                      "headline-md": ["Hanken Grotesk"],
                      "headline-xl-mobile": ["Hanken Grotesk"],
                      "headline-xl": ["Hanken Grotesk"]
              },
              "fontSize": {
                      "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                      "headline-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                      "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                      "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "headline-xl-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                      "headline-xl": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
              }
            },
          },
        }
      </script>
</head>
<body class="font-body-md text-on-surface">
<!-- Top Navigation Bar -->
<header class="bg-surface-container-lowest sticky top-0 w-full z-50 shadow-[0px_4px_12px_rgba(0,33,71,0.08)]">
<div class="flex justify-between items-center px-gutter py-base w-full max-w-7xl mx-auto">
<button class="text-primary active:scale-95 transition-transform hover:opacity-80">
<span class="material-symbols-outlined text-headline-md">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary tracking-tight">Checkout</h1>
<div class="w-6"></div> <!-- Spacer for centering -->
</div>
</header>
<main class="max-w-7xl mx-auto px-gutter pb-xl pt-lg">
<!-- Delivery Section (Implicit but good for UX) -->
<section class="mb-xl">
<h2 class="font-headline-sm text-headline-sm text-primary mb-md">Delivery Information</h2>
<div class="bg-surface-container-lowest p-md rounded-xl shadow-[0px_4px_12px_rgba(0,33,71,0.08)] flex items-start gap-md border border-surface-variant">
<span class="material-symbols-outlined text-secondary fill-icon">location_on</span>
<div class="flex-1">
<p class="font-body-lg font-semibold">Campus Library Hub, Level 2</p>
<p class="text-on-surface-variant font-body-md">University Square, Main Campus</p>
</div>
<button class="text-on-secondary-fixed-variant font-label-md hover:underline">Edit</button>
</div>
</section>
<!-- Payment Method Section -->
<section class="mb-xl">
<h2 class="font-headline-sm text-headline-sm text-primary mb-md">Payment Method</h2>
<div class="space-y-md">
<!-- Selected Option -->

<!-- Digital Wallet Option -->
<label class="flex items-center justify-between bg-surface-container-lowest p-md rounded-xl shadow-[0px_4px_12px_rgba(0,33,71,0.08)] border-2 border-secondary cursor-pointer">
<div class="flex items-center gap-md">
<div class="w-12 h-8 flex items-center justify-center overflow-hidden"><span class="material-symbols-outlined text-on-surface-variant text-[32px]">qr_code_2</span></div>
<p class="font-body-lg font-semibold">DuitNow QR</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-secondary flex items-center justify-center"><div class="w-3 h-3 bg-secondary rounded-full"></div></div>
</label>
</div>
</section>
<!-- Order Summary Section -->
<section class="mb-xl">
<h2 class="font-headline-sm text-headline-sm text-primary mb-md">Order Summary</h2>
<div class="bg-surface-container-lowest p-md rounded-xl shadow-[0px_4px_12px_rgba(0,33,71,0.08)] border border-surface-variant space-y-sm">
<div class="flex justify-between items-center text-on-surface">
<span class="font-body-md">Subtotal</span>
<span class="font-body-md font-semibold">RM 99.00</span>
</div>
<div class="flex justify-between items-center text-on-secondary-fixed-variant">
<span class="font-body-md">Student Discount (5%)</span>
<span class="font-body-md font-semibold">-RM 4.95</span>
</div>
<div class="flex justify-between items-center text-on-surface">
<span class="font-body-md">Campus Delivery</span>
<span class="font-body-md font-bold text-on-secondary-fixed-variant uppercase tracking-wider">FREE</span>
</div>
<div class="flex justify-between items-center text-on-surface pb-sm">
<span class="font-body-md">Tax</span>
<span class="font-body-md font-semibold">RM 7.52</span>
</div>
<div class="border-t border-outline-variant pt-md flex justify-between items-end">
<span class="font-headline-sm text-primary">Total Amount</span>
<div class="text-right">
<span class="font-headline-xl text-on-secondary-fixed-variant block">RM 101.57</span>
<span class="text-label-md text-on-surface-variant uppercase">VAT Included</span>
</div>
</div>
</div>
</section>
<!-- Final CTA -->
<div class="mt-xl space-y-lg">
<button class="w-full bg-secondary text-on-secondary font-bold py-base px-lg rounded-lg shadow-md hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-xs text-sm">
                Pay Now
            </button>
</div>
</main>
<!-- Visual Aesthetic Element: Subtle Mesh Gradient -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden opacity-30">
</div>
<!-- Bottom Nav Suppression (Checkout is transactional) -->
<!-- As per "The Destination Rule" and "Automatic Suppression", the Nav is omitted for focused tasks -->
<script>
        // Micro-interaction for payment selection
        const paymentLabels = document.querySelectorAll('label');
        paymentLabels.forEach(label => {
            label.addEventListener('click', () => {
                paymentLabels.forEach(l => {
                    l.classList.remove('border-secondary', 'border-2');
                    l.classList.add('border-surface-variant', 'border');
                    const dotContainer = l.querySelector('.w-6.h-6');
                    dotContainer.innerHTML = '';
                    dotContainer.className = 'w-6 h-6 rounded-full border-2 border-outline-variant';
                });
                label.classList.remove('border-surface-variant', 'border');
                label.classList.add('border-secondary', 'border-2');
                const dotContainer = label.querySelector('.w-6.h-6');
                dotContainer.className = 'w-6 h-6 rounded-full border-2 border-secondary flex items-center justify-center';
                dotContainer.innerHTML = '<div class="w-3 h-3 bg-secondary rounded-full"></div>';
            });
        });
    </script>


</body></html>
