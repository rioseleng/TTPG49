<body class="font-body-md text-on-surface pb-32">
<!-- Top AppBar -->
<header class="fixed top-0 w-full z-50 bg-surface shadow-sm h-16 flex justify-between items-center px-gutter">
<div class="flex items-center gap-base">
<button class="active:scale-95 transition-transform p-base hover:bg-surface-container-low rounded-full" onclick="window.history.back()">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm-mobile text-primary">Edit Product</h1>
</div>
<div class="flex items-center gap-xs">
<button class="material-symbols-outlined text-primary p-base hover:bg-surface-container-low rounded-full">notifications</button>
</div>
</header>
<!-- Main Content -->
<main class="mt-16 max-w-2xl mx-auto px-gutter py-xl">
<form class="space-y-xl" id="edit-product-form">
<!-- Image Upload Section -->
<section class="space-y-base">
<label class="font-label-md text-label-md text-on-surface-variant uppercase">Product Media</label>
<div class="relative aspect-video w-full rounded-lg bg-surface-container-high overflow-hidden shadow-level-2 group cursor-pointer border-2 border-dashed border-outline-variant hover:border-primary transition-all">
<img class="w-full h-full object-cover" data-alt="A professional studio photograph of a thick hardcover academic textbook titled Advanced Calculus resting on a minimalist white desk. The lighting is bright and even, characteristic of a high-end educational marketplace aesthetic. The scene is clean and organized with subtle shadows, reflecting a professional corporate university environment. The color palette is dominated by neutral whites and deep academic blues." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBjl6ca2N5VX3fzhLYidGT8ixkRplHPVkqGy2MPRc9nhT6fwG9InG4TB6LiSXp2Hd2k5fghfwFjmyRbEj2ocsmRxA2mLSIIrpcvNnsliMmWLrhFTFKxNi4UbRSbuQXPpAp3rNbY_8VtzFMqhAlYKmM-GNNlruR5nU0X36GvyYa0MfeRbW3OgX2uGj-XRgAP966aZ9y7NOM8SkwUBDSDZT4QuWNvFqIXKlK9csOAlonRp59xY6AonLbEPgKTqIG9NT6Dygkst0t4Ac8">
<div class="absolute inset-0 bg-primary/20 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-sm">
<span class="material-symbols-outlined text-on-primary text-4xl">add_a_photo</span>
<p class="text-on-primary font-bold mt-xs">Update Image</p>
</div>
</div>
<p class="text-[10px] text-on-surface-variant italic">Recommended size: 1200 x 675 pixels</p>
</section>
<!-- Form Fields Section -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg bg-surface-container-lowest p-lg rounded-lg shadow-level-2 border border-surface-container">
<!-- Product Name -->
<div class="md:col-span-2 space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="product_name">Product Name</label>
<input class="w-full bg-white border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-md py-sm transition-all font-body-md" id="product_name" type="text" value="Advanced Calculus Textbook">
</div>
<!-- Category -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="category">Category</label>
<select class="w-full bg-white border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-md py-sm transition-all font-body-md appearance-none" id="category">
<option value="other">Other</option>
<option value="clothing">Clothing</option>
<option value="accessories">Accessories</option>
<option value="food">Food</option>
<option selected="" value="textbooks">Textbooks</option>
</select>
</div>
<!-- Price -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="price">Price</label>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant font-bold">RM</span>
<input class="w-full bg-white border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg pl-12 pr-md py-sm transition-all font-body-md font-bold text-secondary" id="price" type="text" value="45.00">
</div>
</div>
<!-- Quantity (Stock) -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="quantity">Quantity (Stock)</label>
<div class="flex items-center gap-xs">
<button class="w-10 h-10 flex items-center justify-center bg-surface-container border border-outline-variant rounded-lg active:scale-90 transition-transform" type="button">
<span class="material-symbols-outlined text-on-surface">remove</span>
</button>
<input class="flex-1 bg-white border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-md py-sm text-center font-body-md" id="quantity" type="number" value="12">
<button class="w-10 h-10 flex items-center justify-center bg-surface-container border border-outline-variant rounded-lg active:scale-90 transition-transform" type="button">
<span class="material-symbols-outlined text-on-surface">add</span>
</button>
</div>
</div>
<!-- Description -->
<div class="md:col-span-2 space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="description">Product Description</label>
<textarea class="w-full bg-white border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-md py-sm transition-all font-body-md resize-none" id="description" rows="5">Comprehensive guide for MAT201. Cover shows minor wear but all pages are intact and clean. Essential for engineering and mathematics majors.</textarea>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-base pt-lg">
<button class="w-full bg-secondary-container text-on-secondary-container font-headline-sm text-headline-sm py-md rounded-lg shadow-level-2 active:scale-95 transition-all flex items-center justify-center gap-xs" type="submit">
<span class="material-symbols-outlined">save</span>
                    Save Changes
                </button>

<button class="w-full bg-transparent border-2 border-primary text-primary font-bold py-sm rounded-lg active:scale-95 transition-transform" type="button">
                        Cancel
                    </button>
<button class="w-full bg-transparent border-2 border-error text-error font-bold py-sm rounded-lg hover:bg-error-container/20 active:scale-95 transition-all flex items-center justify-center gap-xs" type="button">
<span class="material-symbols-outlined text-sm">delete</span>
                        Delete Listing
                    </button>
</div>
</div>
</form>
</main>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center h-16 px-2 pb-safe bg-surface-container-lowest shadow-lg border-t border-outline-variant z-50">

<span class="material-symbols-outlined">home</span>
<span class="font-label-md text-label-md">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors px-4 py-1" href="#">
<span class="material-symbols-outlined">shopping_cart</span>
<span class="font-label-md text-label-md">Cart</span>
</a>
<a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-lg px-4 py-1 active:scale-90 transition-transform" href="#" aria-current="page">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-md text-label-md">Profile</span>
</a>

<script>
        // Simple Interaction logic
        document.getElementById('edit-product-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Updating...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Saved Successfully';
                btn.classList.replace('bg-secondary-container', 'bg-green-100');
                btn.classList.add('text-green-800');
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.replace('bg-green-100', 'bg-secondary-container');
                    btn.classList.remove('text-green-800');
                    btn.disabled = false;
                }, 2000);
            }, 1000);
        });

        // Quantity Stepper Logic
        const quantityInput = document.getElementById('quantity');
        const buttons = document.querySelectorAll('button[type="button"]');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                const icon = btn.querySelector('.material-symbols-outlined').textContent;
                let val = parseInt(quantityInput.value);
                if (icon === 'add') val++;
                if (icon === 'remove' && val > 0) val--;
                quantityInput.value = val;
            });
        });
    </script>
